name: Build and publish Spare Cores images
# Orchestrator: discover images, compute a dependency-ordered plan, then build one
# level at a time via the reusable build-level workflow. Image-specific behaviour
# lives in per-folder metadata (DEPENDS_ON, PLATFORMS, CONTEXT, DOCKERFILE, TARGET,
# BUILD_ARGS) and optional prepare.sh hooks — not in this file.
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_rebuild_resource_tracker:
        description: Rebuild resource-tracker and consumer images without registry cache
        type: boolean
        default: true
permissions:
  contents: read
  packages: write
  id-token: write
  actions: write
env:
  ZRAM_PERCENT: "125"
  # Set to false after resource-tracker consumers have been rebuilt once.
  FORCE_REBUILD_RESOURCE_TRACKER: "true"
jobs:
  find-jobs:
    runs-on: ubuntu-latest
    name: Find Jobs
    outputs:
      arm64_runner: ${{ steps.arm64.outputs.runner }}
      force_rebuild: ${{ steps.force.outputs.value }}
      level0: ${{ steps.plan.outputs.level0 }}
      level1: ${{ steps.plan.outputs.level1 }}
      level2: ${{ steps.plan.outputs.level2 }}
      level3: ${{ steps.plan.outputs.level3 }}
      folders_level0: ${{ steps.plan.outputs.folders_level0 }}
      folders_level1: ${{ steps.plan.outputs.folders_level1 }}
      folders_level2: ${{ steps.plan.outputs.folders_level2 }}
      folders_level3: ${{ steps.plan.outputs.folders_level3 }}
    steps:
      - name: Resolve arm64 runner
        id: arm64
        # Repo variable ARM64_RUNNER (Settings -> Variables -> Actions):
        #   "self-hosted" (default) -> [self-hosted, sc-images-arm64]
        #   "github"                -> ubuntu-24.04-arm
        run: |
          MODE="${{ vars.ARM64_RUNNER || 'self-hosted' }}"
          if [ "$MODE" = "github" ]; then
            echo 'runner="ubuntu-24.04-arm"' >> "$GITHUB_OUTPUT"
          else
            echo 'runner=["self-hosted", "sc-images-arm64"]' >> "$GITHUB_OUTPUT"
          fi
          echo "ARM64_RUNNER=$MODE -> $(grep runner "$GITHUB_OUTPUT")"
      - name: Resolve force-rebuild flag
        id: force
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.force_rebuild_resource_tracker }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${FORCE_REBUILD_RESOURCE_TRACKER}" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v6.0.2
      - name: Compute dependency-ordered build plan
        id: plan
        run: bash "${{ github.workspace }}/.github/scripts/resolve-build-plan.sh" >> "$GITHUB_OUTPUT"

  level0:
    needs: [find-jobs]
    if: ${{ needs.find-jobs.outputs.level0 != '[]' }}
    uses: ./.github/workflows/build-level.yml
    with:
      matrix: ${{ needs.find-jobs.outputs.level0 }}
      folders: ${{ needs.find-jobs.outputs.folders_level0 }}
      arm64_runner: ${{ needs.find-jobs.outputs.arm64_runner }}
      force_rebuild: ${{ needs.find-jobs.outputs.force_rebuild == 'true' }}
    secrets: inherit

  level1:
    needs: [find-jobs, level0]
    if: ${{ !failure() && !cancelled() && needs.find-jobs.outputs.level1 != '[]' }}
    uses: ./.github/workflows/build-level.yml
    with:
      matrix: ${{ needs.find-jobs.outputs.level1 }}
      folders: ${{ needs.find-jobs.outputs.folders_level1 }}
      arm64_runner: ${{ needs.find-jobs.outputs.arm64_runner }}
      force_rebuild: ${{ needs.find-jobs.outputs.force_rebuild == 'true' }}
    secrets: inherit

  level2:
    needs: [find-jobs, level1]
    if: ${{ !failure() && !cancelled() && needs.find-jobs.outputs.level2 != '[]' }}
    uses: ./.github/workflows/build-level.yml
    with:
      matrix: ${{ needs.find-jobs.outputs.level2 }}
      folders: ${{ needs.find-jobs.outputs.folders_level2 }}
      arm64_runner: ${{ needs.find-jobs.outputs.arm64_runner }}
      force_rebuild: ${{ needs.find-jobs.outputs.force_rebuild == 'true' }}
    secrets: inherit

  level3:
    needs: [find-jobs, level2]
    if: ${{ !failure() && !cancelled() && needs.find-jobs.outputs.level3 != '[]' }}
    uses: ./.github/workflows/build-level.yml
    with:
      matrix: ${{ needs.find-jobs.outputs.level3 }}
      folders: ${{ needs.find-jobs.outputs.folders_level3 }}
      arm64_runner: ${{ needs.find-jobs.outputs.arm64_runner }}
      force_rebuild: ${{ needs.find-jobs.outputs.force_rebuild == 'true' }}
    secrets: inherit
