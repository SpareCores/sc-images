name: Build and publish Spare Cores images
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_rebuild_resource_tracker:
        description: Rebuild resource-tracker and consumer images without registry cache
        type: boolean
        default: true
env:
  REGISTRY: ghcr.io
  # Set to false after resource-tracker consumers have been rebuilt once.
  FORCE_REBUILD_RESOURCE_TRACKER: "true"
  # ubuntu-24.04-arm (~3 vCPU, 16 GiB): serial vLLM CUDA compile + modest BuildKit parallelism.
  VLLM_MAX_JOBS_HOSTED: "1"
  VLLM_NVCC_THREADS_HOSTED: "1"
  BUILDKIT_MAX_PARALLELISM_HOSTED: "1"
  # Self-hosted arm64 builder (e.g. AWS c6g.8xlarge: 32 vCPU, 64 GiB).
  VLLM_MAX_JOBS_SELF_HOSTED: "16"
  VLLM_NVCC_THREADS_SELF_HOSTED: "2"
  BUILDKIT_MAX_PARALLELISM_SELF_HOSTED: "4"
  # Images that COPY the resource-tracker binary.
  RESOURCE_TRACKER_IMAGES: '["resource-tracker","benchmark","benchmark-web","benchmark-redis","benchmark-passmark","benchmark-llm","benchmark-vllm-gpu","benchmark-vllm-cpu","benchmark-vllm-cpu-avx2","stress-ng","stress-ng-longrun","nvbandwidth"]'
  # amd64-only images (no arm64 matrix leg); merged as main-amd64 -> main.
  AMD64_ONLY_IMAGES: '["vllm-cpu-base-avx2","benchmark-vllm-cpu-avx2"]'
jobs:
  find-jobs:
    runs-on: ubuntu-latest
    name: Find Jobs
    outputs:
      folders: ${{ steps.jobs.outputs.folders }}
      build_folders: ${{ steps.filter.outputs.build_folders }}
    steps:
      - uses: actions/checkout@v6.0.2
      - id: jobs
        uses: kmanimaran/list-folder-action@v4
        with:
          path: ./images
      - name: Filter image folders for build matrix
        id: filter
        run: |
          FOLDERS='${{ steps.jobs.outputs.folders }}'
          echo "build_folders=$(echo "$FOLDERS" | jq -c '[.[] | select(. != "vllm-gpu-base" and . != "vllm-cpu-base-avx2")]')" >> "$GITHUB_OUTPUT"

  build-vllm-gpu-base:
    name: Build vllm-gpu-base (arm64 CUDA)
    # Register the self-hosted runner with label sc-images-arm64 (see images/vllm-gpu-base/README.md).
    runs-on: [self-hosted, sc-images-arm64]
    timeout-minutes: 360
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Free disk space for CUDA build
        if: ${{ !contains(runner.labels, 'self-hosted') }}
        run: |
          # vLLM layers + flashinfer-jit-cache (~2 GiB wheel, ~4 GiB extract) need
          # tens of GiB under /var/lib/docker on the same root volume as swap.
          sudo rm -rf /usr/share/dotnet /usr/share/swift /usr/local/lib/android \
            /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            /usr/local/share/powershell /usr/share/az* /usr/local/lib/node_modules \
            /usr/share/miniconda /usr/local/aws-cli /usr/local/aws-sam-cli
          sudo docker system prune -af || true
          df -h /
          docker system df || true
      - name: Prepare runner for CUDA compile
        id: vllm_build
        run: |
          if [[ "${{ contains(runner.labels, 'self-hosted') }}" == "true" ]]; then
            echo "max_jobs=${{ env.VLLM_MAX_JOBS_SELF_HOSTED }}" >> "$GITHUB_OUTPUT"
            echo "nvcc_threads=${{ env.VLLM_NVCC_THREADS_SELF_HOSTED }}" >> "$GITHUB_OUTPUT"
            echo "buildkit_max_parallelism=${{ env.BUILDKIT_MAX_PARALLELISM_SELF_HOSTED }}" >> "$GITHUB_OUTPUT"
          else
            # Serial compile can still spike RAM; use modest swap (disk is the bottleneck).
            if ! swapon --show | grep -q /swapfile; then
              sudo fallocate -l 16G /swapfile 2>/dev/null \
                || sudo dd if=/dev/zero of=/swapfile bs=1M count=16384 status=none
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
            fi
            echo "max_jobs=${{ env.VLLM_MAX_JOBS_HOSTED }}" >> "$GITHUB_OUTPUT"
            echo "nvcc_threads=${{ env.VLLM_NVCC_THREADS_HOSTED }}" >> "$GITHUB_OUTPUT"
            echo "buildkit_max_parallelism=${{ env.BUILDKIT_MAX_PARALLELISM_HOSTED }}" >> "$GITHUB_OUTPUT"
          fi
          free -h
          df -h /
      - name: Read VLLM version
        id: vllm
        working-directory: ${{ github.workspace }}
        run: echo "version=$(tr -d '[:space:]' < vllm-common/VLLM_VERSION)" >> "$GITHUB_OUTPUT"
      - name: Clone vLLM source
        working-directory: ${{ github.workspace }}/vllm-common
        run: |
          git clone --depth 1 --branch "v${{ steps.vllm.outputs.version }}" \
            https://github.com/vllm-project/vllm.git .vllm-src
      - name: Log in to the Container registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = ${{ steps.vllm_build.outputs.buildkit_max_parallelism }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/sparecores/vllm-gpu-base
          flavor: |
            suffix=-arm64,onlatest=false
      - name: Build and push vllm-gpu-base
        uses: docker/build-push-action@v7.1.0
        with:
          context: ${{ github.workspace }}/vllm-common/.vllm-src
          file: ${{ github.workspace }}/vllm-common/.vllm-src/docker/Dockerfile
          target: vllm-openai
          platforms: linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            max_jobs=${{ steps.vllm_build.outputs.max_jobs }}
            nvcc_threads=${{ steps.vllm_build.outputs.nvcc_threads }}
            torch_cuda_arch_list=9.0 10.0+PTX
            RUN_WHEEL_CHECK=false
          cache-from: type=registry,ref=${{ env.REGISTRY }}/sparecores/vllm-gpu-base:buildcache-arm64
          cache-to: type=registry,ref=${{ env.REGISTRY }}/sparecores/vllm-gpu-base:buildcache-arm64,mode=min

  build-vllm-cpu-base-avx2:
    name: Build vllm-cpu-base-avx2 (amd64 AVX2)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Read VLLM version
        id: vllm
        working-directory: ${{ github.workspace }}
        run: echo "version=$(tr -d '[:space:]' < vllm-common/VLLM_VERSION)" >> "$GITHUB_OUTPUT"
      - name: Clone vLLM source
        working-directory: ${{ github.workspace }}/vllm-common
        run: |
          git clone --depth 1 --branch "v${{ steps.vllm.outputs.version }}" \
            https://github.com/vllm-project/vllm.git .vllm-src
      - name: Log in to the Container registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/sparecores/vllm-cpu-base-avx2
          flavor: |
            suffix=-amd64,onlatest=false
      - name: Build and push vllm-cpu-base-avx2
        uses: docker/build-push-action@v7.1.0
        with:
          context: ${{ github.workspace }}/vllm-common/.vllm-src
          file: ${{ github.workspace }}/vllm-common/.vllm-src/docker/Dockerfile.cpu
          target: vllm-openai
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VLLM_CPU_AVX2=true
            max_jobs=4
          cache-from: type=registry,ref=${{ env.REGISTRY }}/sparecores/vllm-cpu-base-avx2:buildcache-amd64
          cache-to: type=registry,ref=${{ env.REGISTRY }}/sparecores/vllm-cpu-base-avx2:buildcache-amd64,mode=max

  build-images:
    name: Build image (${{ matrix.folder }} / ${{ matrix.arch }})
    needs: [find-jobs, build-vllm-gpu-base, build-vllm-cpu-base-avx2]
    defaults:
      run:
        working-directory: ${{ github.workspace }}/images/${{ matrix.folder }}
    strategy:
      fail-fast: false
      matrix:
        folder: ${{ fromJson(needs.find-jobs.outputs.build_folders) }}
        arch: [amd64, arm64]
        exclude:
          - folder: benchmark-vllm-cpu-avx2
            arch: arm64
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: [self-hosted, sc-images-arm64]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.2
      - name: Read resource-tracker version
        if: matrix.folder == 'resource-tracker'
        id: resource_tracker
        working-directory: ${{ github.workspace }}
        run: echo "version=$(tr -d '[:space:]' < images/resource-tracker/RESOURCE_TRACKER_VERSION)" >> "$GITHUB_OUTPUT"
      - name: Log in to the Container registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
        with:
          buildkitd-config-inline: ${{ matrix.arch == 'arm64' && contains(runner.labels, 'self-hosted') && format('[worker.oci]\n  max-parallelism = {0}', env.BUILDKIT_MAX_PARALLELISM_SELF_HOSTED) || '' }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/sparecores/${{ matrix.folder }}
          flavor: |
            suffix=-${{ matrix.arch }},onlatest=false
      - name: Read vLLM version
        if: startsWith(matrix.folder, 'benchmark-vllm')
        id: vllm_benchmark
        working-directory: ${{ github.workspace }}
        run: echo "version=$(tr -d '[:space:]' < vllm-common/VLLM_VERSION)" >> "$GITHUB_OUTPUT"
      - name: Build and push Docker image
        uses: docker/build-push-action@v7.1.0
        with:
          context: ${{ startsWith(matrix.folder, 'benchmark-vllm') && github.workspace || format('{0}/images/{1}', github.workspace, matrix.folder) }}
          file: ${{ format('{0}/images/{1}/Dockerfile', github.workspace, matrix.folder) }}
          platforms: ${{ matrix.platform }}
          push: true
          pull: ${{ contains(fromJSON(env.RESOURCE_TRACKER_IMAGES), matrix.folder) || matrix.folder == 'benchmark-vllm-gpu' || matrix.folder == 'benchmark-vllm-cpu-avx2' }}
          no-cache: ${{ (env.FORCE_REBUILD_RESOURCE_TRACKER == 'true' || github.event_name == 'workflow_dispatch' && inputs.force_rebuild_resource_tracker) && contains(fromJSON(env.RESOURCE_TRACKER_IMAGES), matrix.folder) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.folder == 'resource-tracker' && format('RESOURCE_TRACKER_VERSION={0}', steps.resource_tracker.outputs.version) || (startsWith(matrix.folder, 'benchmark-vllm') && format('RESOURCE_TRACKER_IMAGE=ghcr.io/sparecores/resource-tracker:main-{0}\nVLLM_VERSION={1}', matrix.arch, steps.vllm_benchmark.outputs.version) || format('RESOURCE_TRACKER_IMAGE=ghcr.io/sparecores/resource-tracker:main-{0}', matrix.arch)) }}
          cache-from: ${{ (env.FORCE_REBUILD_RESOURCE_TRACKER == 'true' || github.event_name == 'workflow_dispatch' && inputs.force_rebuild_resource_tracker) && contains(fromJSON(env.RESOURCE_TRACKER_IMAGES), matrix.folder) && '' || format('type=registry,ref={0}/sparecores/{1}:buildcache-{2}', env.REGISTRY, matrix.folder, matrix.arch) }}
          cache-to: ${{ (env.FORCE_REBUILD_RESOURCE_TRACKER == 'true' || github.event_name == 'workflow_dispatch' && inputs.force_rebuild_resource_tracker) && contains(fromJSON(env.RESOURCE_TRACKER_IMAGES), matrix.folder) && '' || format('type=registry,ref={0}/sparecores/{1}:buildcache-{2},mode=max', env.REGISTRY, matrix.folder, matrix.arch) }}

  merge-manifests:
    name: Merge image manifests (${{ matrix.folder }})
    needs: [find-jobs, build-images, build-vllm-gpu-base, build-vllm-cpu-base-avx2]
    strategy:
      fail-fast: false
      matrix:
        folder: ${{ fromJson(needs.find-jobs.outputs.folders) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.2
      - name: Log in to the Container registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/sparecores/${{ matrix.folder }}
      - name: Promote arm64-only vllm-gpu-base to main
        if: matrix.folder == 'vllm-gpu-base'
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker buildx imagetools create \
              --tag "$tag" \
              "${tag}-arm64"
          done <<< "${{ steps.meta.outputs.tags }}"
      - name: Promote amd64-only images to main
        if: contains(fromJSON(env.AMD64_ONLY_IMAGES), matrix.folder)
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker buildx imagetools create \
              --tag "$tag" \
              "${tag}-amd64"
          done <<< "${{ steps.meta.outputs.tags }}"
      - name: Create multi-arch manifests
        if: matrix.folder != 'vllm-gpu-base' && !contains(fromJSON(env.AMD64_ONLY_IMAGES), matrix.folder)
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker buildx imagetools create \
              --tag "$tag" \
              "$tag-amd64" \
              "$tag-arm64"
          done <<< "${{ steps.meta.outputs.tags }}"
